<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/head :: head('회사 관리')}"></head>
<body class="bg-gray-50 min-h-screen">

<!-- 인증 헤더 -->
<div th:replace="~{common/header-auth :: header-auth}"></div>

<!-- 메인 콘텐츠 -->
<main class="pt-16 max-w-7xl mx-auto px-6 py-10">
    <div class="flex gap-8">

        <!-- 사이드바 -->
        <div th:replace="~{common/sidebar-mypage :: sidebar-mypage('company')}"></div>

        <!-- 콘텐츠 영역 -->
        <div class="flex-1 min-w-0 space-y-6">

            <!-- 회사 등록 / 관리 카드 -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                <h2 class="text-xl font-bold text-gray-900 mb-2">회사 관리</h2>
                <p class="text-sm text-gray-400 mb-8">회사 정보를 등록하고 관리하세요</p>

                <!-- 글로벌 에러/성공 -->
                <div id="global-error" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600"></div>
                <div id="success-message" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-xl text-sm text-green-600"></div>

                <!-- 기존 회사가 있는 경우 -->
                <div th:if="${company != null}">
                    <!-- 상태 뱃지 -->
                    <div class="flex items-center gap-3 mb-6 p-4 rounded-xl"
                         th:classappend="${company.pending()} ? 'bg-yellow-50 border border-yellow-100' : 'bg-green-50 border border-green-100'">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                             th:classappend="${company.pending()} ? 'bg-yellow-100' : 'bg-green-100'">
                            <svg th:if="${company.pending()}" class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <svg th:unless="${company.pending()}" class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="text-sm font-semibold"
                                 th:classappend="${company.pending()} ? 'text-yellow-800' : 'text-green-800'"
                                 th:text="${company.pending()} ? '승인 대기 중' : '승인 완료'">상태</div>
                            <div class="text-xs mt-0.5"
                                 th:classappend="${company.pending()} ? 'text-yellow-500' : 'text-green-500'"
                                 th:text="${company.pending()} ? '관리자 승인 후 사용 가능합니다' : '모든 기능을 이용할 수 있습니다'">상태 설명</div>
                        </div>
                    </div>

                    <!-- 회사 정보 수정 폼 -->
                    <form id="company-form" class="space-y-5" onsubmit="return false;">
                        <div>
                            <label for="companyName" class="block text-sm font-medium text-gray-700 mb-1.5">회사명</label>
                            <input type="text"
                                   id="companyName"
                                   name="companyName"
                                   th:value="${company.name()}"
                                   maxlength="50"
                                   placeholder="회사명을 입력하세요"
                                   class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-transparent transition-all"/>
                            <p id="companyName-error" class="hidden mt-1.5 text-xs text-red-500"></p>
                        </div>

                        <button type="button"
                                onclick="updateCompany()"
                                class="px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-xl transition-colors">
                            저장하기
                        </button>
                    </form>
                </div>

                <!-- 회사가 없는 경우 (신규 등록) -->
                <div th:unless="${company != null}">
                    <div class="mb-6 p-5 bg-blue-50 border border-blue-100 rounded-xl">
                        <div class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-blue-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <p class="text-sm text-blue-700">
                                회사를 등록하면 프로젝트를 생성하고 팀원을 초대할 수 있습니다.
                                등록 후 관리자 승인이 필요합니다.
                            </p>
                        </div>
                    </div>

                    <form id="company-form" class="space-y-5" onsubmit="return false;">
                        <div>
                            <label for="companyName" class="block text-sm font-medium text-gray-700 mb-1.5">회사명</label>
                            <input type="text"
                                   id="companyName"
                                   name="companyName"
                                   maxlength="50"
                                   placeholder="회사명을 입력하세요"
                                   class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-transparent transition-all"/>
                            <p id="companyName-error" class="hidden mt-1.5 text-xs text-red-500"></p>
                        </div>

                        <button type="button"
                                onclick="registerCompany()"
                                class="px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-xl transition-colors">
                            승인 요청하기
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 공통 인증 JS (로그아웃) -->
<script src="/js/member/auth.js"></script>

</body>
</html>
