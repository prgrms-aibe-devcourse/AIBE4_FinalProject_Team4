<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout/layout :: layout('참여 중인 프로젝트', ~{:: #main-content})}">
<head>
    <!-- layout.html의 head로 대체 -->
</head>
<body class="bg-gray-50 min-h-screen">
<div id="main-content">
    <th:block th:if="${showSidebar == null or !showSidebar}">

        <div class="flex flex-col min-h-screen">
            <div th:replace="~{common/fragments/header-auth :: header-auth}"></div>

            <main class="flex-1 pt-20 w-full max-w-4xl mx-auto px-6 pb-10">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between mb-8">
                    <div>
                        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">참여 중인 프로젝트</h1>
                        <p class="mt-2 text-sm text-gray-500 leading-relaxed">
                            작업할 프로젝트를 선택해주세요. 각 프로젝트의 팀 내 역할과 최근 활동 상태를 확인하실 수 있습니다.
                        </p>
                    </div>
                    <a th:href="@{/projects/new}"
                       class="inline-flex items-center gap-2 rounded-xl bg-blue-500 px-5 py-2.5
                              text-sm font-semibold text-white shadow-sm hover:bg-blue-600
                              active:scale-[0.99] transition shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        새 프로젝트 생성
                    </a>
                </div>
                <div th:replace="~{member/dashboard-fragments :: project-list}"></div>
            </main>

            <footer class="border-t border-gray-200 py-6 text-center text-xs text-gray-400">
                © 2026 Documind Incs. All rights reserved.
            </footer>
        </div>
    </th:block>

    <th:block th:if="${showSidebar}">

        <div th:replace="~{common/fragments/sidebar-mypage :: sidebar-mypage('projects')}"></div>

        <div class="ml-64 flex flex-col min-h-screen">
            <div th:replace="~{common/fragments/header-auth :: user-bar}"></div>

            <main class="flex-1 px-8 py-8">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between mb-8">
                    <div>
                        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">참여 중인 프로젝트</h1>
                        <p class="mt-2 text-sm text-gray-500 leading-relaxed">
                            작업할 프로젝트를 선택해주세요. 각 프로젝트의 팀 내 역할과 최근 활동 상태를 확인하실 수 있습니다.
                        </p>
                    </div>
                    <a th:href="@{/projects/new}"
                       class="inline-flex items-center gap-2 rounded-xl bg-blue-500 px-5 py-2.5
                              text-sm font-semibold text-white shadow-sm hover:bg-blue-600
                              active:scale-[0.99] transition shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        새 프로젝트 생성
                    </a>
                </div>
                <div th:replace="~{member/dashboard-fragments :: project-list}"></div>
            </main>

            <footer class="border-t border-gray-200 py-6 text-center text-xs text-gray-400">
                © 2026 Documind Incs. All rights reserved.
            </footer>
        </div>
    </th:block>

    <!-- 로그아웃 모달 + 공통 JS -->
    <div th:replace="~{common/fragments/header-auth :: logout-modal}"></div>
    <script th:src="@{/js/common/FetchUtil.js}"></script>
    <script th:src="@{/js/member/Auth.js}"></script>
</div>
</body>
</html>
