<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/head :: head('내 프로필')}"></head>
<body class="bg-gray-50 min-h-screen">

<!-- 인증 헤더 -->
<div th:replace="~{common/header-auth :: header-auth}"></div>

<!-- 메인 콘텐츠 -->
<main class="pt-16 max-w-7xl mx-auto px-6 py-10">
    <div class="flex gap-8">

        <!-- 사이드바 -->
        <div th:replace="~{common/sidebar-mypage :: sidebar-mypage('profile')}"></div>

        <!-- 콘텐츠 영역 -->
        <div class="flex-1 min-w-0">
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">

                <!-- 페이지 타이틀 -->
                <h2 class="text-xl font-bold text-gray-900 mb-8">내 프로필</h2>

                <!-- 글로벌 에러 표시 영역 -->
                <div id="global-error" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600"></div>
                <div id="success-message" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-xl text-sm text-green-600"></div>

                <!-- 프로필 이미지 & 기본 정보 -->
                <div class="flex items-start gap-6 mb-8 pb-8 border-b border-gray-100">
                    <!-- 프로필 이미지 -->
                    <div class="shrink-0">
                        <div th:if="${profile.profileImageUrl() != null}"
                             class="w-20 h-20 rounded-2xl overflow-hidden bg-gray-100">
                            <img th:src="${profile.profileImageUrl()}" alt="프로필 이미지" class="w-full h-full object-cover"/>
                        </div>
                        <div th:unless="${profile.profileImageUrl() != null}"
                             class="w-20 h-20 rounded-2xl bg-primary-100 flex items-center justify-center">
                            <span th:text="${#strings.substring(profile.nickname(), 0, 1)}"
                                  class="text-3xl font-bold text-primary-600">U</span>
                        </div>
                    </div>

                    <!-- 이름 & 이메일 (읽기 전용) -->
                    <div class="flex-1">
                        <div class="text-lg font-semibold text-gray-900 mb-1" th:text="${profile.name()}">이름</div>
                        <div class="text-sm text-gray-400" th:text="${profile.email()}">이메일</div>
                        <div class="flex items-center gap-2 mt-3">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                                  th:classappend="${profile.globalRole() == 'ADMIN'} ? 'bg-red-100 text-red-700' :
                                                  (${profile.globalRole() == 'CEO'} ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700')"
                                  th:text="${profile.globalRole()}">
                                ROLE
                            </span>
                            <span th:if="${profile.position() != null}"
                                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600"
                                  th:text="${profile.position()}">
                                POSITION
                            </span>
                        </div>
                    </div>
                </div>

                <!-- 프로필 수정 폼 -->
                <form id="profile-form" class="space-y-6" onsubmit="return false;">

                    <!-- 닉네임 (편집 가능) -->
                    <div>
                        <label for="nickname" class="block text-sm font-medium text-gray-700 mb-1.5">
                            닉네임
                        </label>
                        <div class="flex gap-3">
                            <input type="text"
                                   id="nickname"
                                   name="nickname"
                                   th:value="${profile.nickname()}"
                                   maxlength="20"
                                   placeholder="닉네임을 입력하세요"
                                   class="flex-1 px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-transparent transition-all"/>
                            <button type="button"
                                    onclick="updateNickname()"
                                    class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-xl transition-colors whitespace-nowrap">
                                저장
                            </button>
                        </div>
                        <p id="nickname-error" class="hidden mt-1.5 text-xs text-red-500"></p>
                    </div>

                    <!-- 이름 (읽기 전용) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">이름</label>
                        <input type="text"
                               th:value="${profile.name()}"
                               readonly
                               class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-500 cursor-not-allowed"/>
                        <p class="mt-1 text-xs text-gray-400">소셜 계정에서 가져온 정보는 변경할 수 없습니다</p>
                    </div>

                    <!-- 이메일 (읽기 전용) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">이메일</label>
                        <input type="email"
                               th:value="${profile.email()}"
                               readonly
                               class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-500 cursor-not-allowed"/>
                    </div>

                    <!-- 소속 정보 -->
                    <div class="pt-6 border-t border-gray-100">
                        <h3 class="text-sm font-semibold text-gray-700 mb-4">소속 정보</h3>
                        <div th:if="${profile.companyName() != null}"
                             class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl border border-gray-100">
                            <div class="w-8 h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center shrink-0">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"/>
                                </svg>
                            </div>
                            <div>
                                <div class="text-sm font-medium text-gray-800" th:text="${profile.companyName()}">회사명</div>
                                <div class="text-xs text-gray-400 mt-0.5" th:text="${profile.position()}">직책</div>
                            </div>
                            <!-- 승인 대기 뱃지 -->
                            <span th:if="${profile.companyPending()}"
                                  class="ml-auto inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700">
                                승인 대기
                            </span>
                            <span th:unless="${profile.companyPending()}"
                                  class="ml-auto inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">
                                정상
                            </span>
                        </div>
                        <div th:unless="${profile.companyName() != null}"
                             class="p-4 bg-gray-50 rounded-xl border border-dashed border-gray-200 text-center">
                            <p class="text-sm text-gray-400 mb-3">아직 소속 회사가 없습니다</p>
                            <a href="/my/company"
                               class="text-sm text-primary-600 hover:text-primary-700 font-medium">
                                회사 등록하기 →
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<!-- 공통 인증 JS (로그아웃) -->
<script src="/js/member/auth.js"></script>
</body>
</html>
