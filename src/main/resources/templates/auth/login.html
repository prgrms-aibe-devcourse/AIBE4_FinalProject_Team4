<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/fragments/head :: head('로그인')}"></head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-indigo-50 flex flex-col items-center justify-center px-4 py-12">

<!-- 로고 -->
<a href="/" class="flex items-center gap-2 mb-10">
    <div class="w-9 h-9 bg-primary-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
    </div>
    <span class="text-2xl font-bold text-gray-900">Documind</span>
</a>

<!-- 카드 컨테이너 -->
<div class="w-full max-w-md">

    <!-- Step 1: 역할 선택 -->
    <div id="step-1" class="bg-white rounded-2xl shadow-xl shadow-gray-100 border border-gray-100 p-8 transition-all duration-300">
        <!-- 헤더 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-gray-100 rounded-full text-xs text-gray-500 mb-4">
                <span class="w-4 h-4 bg-primary-600 text-white rounded-full text-[10px] flex items-center justify-center font-bold">1</span>
                <span>1단계 / 2단계</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">어떤 역할로 시작하시나요?</h1>
            <p class="text-gray-500 text-sm">역할에 따라 접근 권한이 달라집니다</p>
        </div>

        <!-- 역할 선택 카드 -->
        <div class="space-y-3">
            <!-- CEO / 관리자 -->
            <button type="button"
                    data-role="CEO"
                    onclick="selectRole(this)"
                    class="role-card w-full text-left p-5 rounded-xl border-2 border-gray-100 hover:border-primary-300 hover:bg-primary-50 transition-all duration-200 group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-amber-100 group-hover:bg-amber-200 rounded-xl flex items-center justify-center shrink-0 transition-colors">
                        <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-gray-900">관리자 (CEO)</div>
                        <div class="text-xs text-gray-400 mt-0.5">회사 생성, 프로젝트 관리, 팀원 초대</div>
                    </div>
                    <svg class="w-5 h-5 text-gray-300 group-hover:text-primary-400 ml-auto transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </button>

            <!-- 일반 직원 -->
            <button type="button"
                    data-role="EMPLOYEE"
                    onclick="selectRole(this)"
                    class="role-card w-full text-left p-5 rounded-xl border-2 border-gray-100 hover:border-primary-300 hover:bg-primary-50 transition-all duration-200 group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-100 group-hover:bg-blue-200 rounded-xl flex items-center justify-center shrink-0 transition-colors">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-gray-900">일반 직원</div>
                        <div class="text-xs text-gray-400 mt-0.5">이슈 확인, 문서 검색, 팀 협업</div>
                    </div>
                    <svg class="w-5 h-5 text-gray-300 group-hover:text-primary-400 ml-auto transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </button>
        </div>
    </div>

    <!-- Step 2: 소셜 로그인 선택 -->
    <div id="step-2" class="hidden bg-white rounded-2xl shadow-xl shadow-gray-100 border border-gray-100 p-8 transition-all duration-300">
        <!-- 헤더 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-gray-100 rounded-full text-xs text-gray-500 mb-4">
                <span class="w-4 h-4 bg-primary-600 text-white rounded-full text-[10px] flex items-center justify-center font-bold">2</span>
                <span>2단계 / 2단계</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">소셜 계정으로 계속하기</h1>
            <p class="text-gray-500 text-sm">
                <span id="selected-role-label" class="font-medium text-primary-600"></span>
                으로 로그인합니다
            </p>
        </div>

        <!-- 소셜 로그인 버튼 -->
        <div class="space-y-3">
            <!-- Google -->
            <a id="google-oauth-btn"
               href="/oauth2/authorization/google"
               class="flex items-center justify-center gap-3 w-full px-5 py-3.5 bg-white hover:bg-gray-50 border-2 border-gray-200 hover:border-gray-300 text-gray-700 font-medium rounded-xl transition-all duration-200 text-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google로 계속하기
            </a>

            <!-- GitHub -->
            <a id="github-oauth-btn"
               href="/oauth2/authorization/github"
               class="flex items-center justify-center gap-3 w-full px-5 py-3.5 bg-gray-900 hover:bg-gray-800 text-white font-medium rounded-xl transition-all duration-200 text-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub로 계속하기
            </a>
        </div>

        <!-- 뒤로 가기 -->
        <button type="button"
                onclick="goBack()"
                class="mt-6 w-full flex items-center justify-center gap-2 text-sm text-gray-400 hover:text-gray-600 transition-colors py-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            역할 선택으로 돌아가기
        </button>
    </div>

    <!-- Step Role Conflict: 역할 불일치 알림 -->
    <div id="step-role-conflict" class="hidden bg-white rounded-2xl shadow-xl shadow-gray-100 border border-gray-100 p-8 transition-all duration-300">
        <!-- 헤더 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-amber-100 rounded-2xl mb-4">
                <svg class="w-7 h-7 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">이미 가입된 계정이 있습니다</h1>
            <p class="text-gray-500 text-sm">
                이 계정은
                <span id="existing-role-label" class="font-semibold text-primary-600"></span>
                계정으로 가입되어 있습니다.
            </p>
        </div>

        <!-- 선택 버튼 -->
        <div class="space-y-3">
            <!-- Google로 로그인 (provider=google 일 때만 표시) -->
            <a id="role-conflict-google-btn"
               href="/oauth2/authorization/google"
               class="hidden flex items-center justify-center gap-3 w-full px-5 py-3.5 bg-white hover:bg-gray-50 border-2 border-gray-200 hover:border-gray-300 text-gray-700 font-medium rounded-xl transition-all duration-200 text-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google 계정으로 로그인하기
            </a>

            <!-- GitHub로 로그인 (provider=github 일 때만 표시) -->
            <a id="role-conflict-github-btn"
               href="/oauth2/authorization/github"
               class="hidden flex items-center justify-center gap-3 w-full px-5 py-3.5 bg-gray-900 hover:bg-gray-800 text-white font-medium rounded-xl transition-all duration-200 text-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub 계정으로 로그인하기
            </a>

            <!-- 처음으로 돌아가기 -->
            <button type="button"
                    onclick="goBackFromRoleConflict()"
                    class="mt-2 w-full flex items-center justify-center gap-2 text-sm text-gray-400 hover:text-gray-600 transition-colors py-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                처음으로 돌아가기
            </button>
        </div>
    </div>

    <!-- Step Conflict: 이메일 중복 알림 (Provider 불일치) -->
    <div id="step-conflict" class="hidden bg-white rounded-2xl shadow-xl shadow-gray-100 border border-gray-100 p-8 transition-all duration-300">
        <!-- 헤더 -->
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-gray-900 mb-2">이 이메일로 사용 중인 계정이 있습니다</h1>

            <!-- 프로필 카드 -->
            <div class="mt-6 p-4 bg-gray-50 rounded-xl border border-gray-100 flex items-center gap-4 text-left">
                <!-- 아바타 (JS로 채움: 실제 프로필 이미지 또는 이니셜) -->
                <div id="conflict-avatar"
                     class="w-12 h-12 rounded-full overflow-hidden shrink-0 flex items-center justify-center"></div>
                <div>
                    <div class="font-bold text-gray-900 flex items-center gap-2">
                        <span id="conflict-nickname"></span>
                        <span id="conflict-role-badge"
                              class="hidden px-2 py-0.5 rounded text-[10px] font-bold"></span>
                    </div>
                    <div class="text-xs text-gray-500 mt-0.5" id="conflict-email"></div>
                </div>
            </div>

            <p class="mt-6 text-gray-500 text-sm">로그인 방식을 선택해주세요.</p>
        </div>

        <!-- 선택 버튼 (JS로 채움: Google/GitHub 스타일 버튼) -->
        <div id="conflict-buttons" class="space-y-3"></div>

        <!-- 처음으로 돌아가기 -->
        <button type="button"
                onclick="goBackFromConflict()"
                class="mt-4 w-full flex items-center justify-center gap-2 text-sm text-gray-400 hover:text-gray-600 transition-colors py-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            처음으로 돌아가기
        </button>
    </div>
</div>

<!-- 로그인 관련 JS -->
<script src="/js/member/Login.js"></script>
</body>
</html>
