<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="top-toast">
    <!-- 상단 토스트 메시지 컨테이너 (초기 상태: 화면 위로 숨김) -->
    <div id="top-toast-container"
         class="fixed top-0 left-0 right-0 z-50 flex justify-center transition-transform duration-500 -translate-y-full">
        <div id="top-toast-message"
             class="mt-4 px-6 py-3 rounded-full shadow-lg text-white font-medium text-sm flex items-center gap-2 bg-gray-800">
            <!-- 아이콘 -->
            <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <!-- 메시지 텍스트 -->
            <span id="top-toast-text">알림 메시지</span>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 서버에서 전달된 Flash Attribute 확인 (Thymeleaf 변수)
            const flashMsg = /*[[${topToast}]]*/ null;
            if (flashMsg) {
                showTopToast(flashMsg);
                return;
            }

            // 2. URL 파라미터 확인 (리다이렉트 시 전달된 메시지)
            const params = new URLSearchParams(window.location.search);
            const toastParam = params.get('toast_message');

            const roleMessages = {
                role_mismatch_ceo: '관리자(CEO) 계정으로 로그인되었습니다.',
                role_mismatch_employee: '일반 직원 계정으로 로그인되었습니다.',
                role_mismatch: '선택하신 역할과 다른 계정으로 로그인되었습니다.',
            };

            if (toastParam) {
                const message = roleMessages[toastParam] ?? decodeURIComponent(toastParam);
                showTopToast(message);
            }

            if (toastParam) {
                // 파라미터 제거 (새로고침 시 다시 뜨지 않도록)
                const newUrl = window.location.pathname
                    + window.location.search.replace(/[?&]toast_message=[^&]+/, '').replace(/^&/, '?');
                window.history.replaceState({}, '', newUrl);
            }
        });

        function showTopToast(message, duration = 5000) {
            const container = document.getElementById('top-toast-container');
            const textSpan = document.getElementById('top-toast-text');

            if (!container || !textSpan) return;

            textSpan.textContent = message;

            // 아래로 슬라이드 다운 (보여주기)
            container.classList.remove('-translate-y-full');

            // 지정된 시간 후 위로 슬라이드 업 (숨기기)
            setTimeout(() => {
                container.classList.add('-translate-y-full');
            }, duration);
        }
        /*]]>*/
    </script>
</div>
</html>
