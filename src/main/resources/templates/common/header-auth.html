<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!-- 로그인 후 공통 헤더 -->
<header th:fragment="header-auth" class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

        <!-- 좌측: 로고 -->
        <a href="/dashboard" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <span class="text-xl font-bold text-gray-900">Documind</span>
        </a>

        <!-- 우측: 사용자 정보 + 로그아웃 -->
        <div class="flex items-center gap-4">

            <!-- 역할 뱃지 -->
            <span th:if="${headerInfo != null and headerInfo.globalRole() == 'ADMIN'}"
                  class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">
                ADMIN
            </span>
            <span th:if="${headerInfo != null and headerInfo.globalRole() == 'CEO'}"
                  class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">
                CEO
            </span>
            <span th:if="${headerInfo != null and headerInfo.globalRole() == 'EMPLOYEE'}"
                  class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700">
                EMPLOYEE
            </span>

            <!-- 프로필 링크 -->
            <a href="/my/profile" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <!-- 프로필 이미지 or 기본 아바타 -->
                <div th:if="${headerInfo != null and headerInfo.profileImageUrl() != null}"
                     class="w-8 h-8 rounded-full overflow-hidden bg-gray-200">
                    <img th:src="${headerInfo.profileImageUrl()}" alt="프로필" class="w-full h-full object-cover"/>
                </div>
                <div th:unless="${headerInfo != null and headerInfo.profileImageUrl() != null}"
                     class="w-8 h-8 rounded-full bg-primary-100 flex items-center justify-center">
                    <span th:if="${headerInfo != null}"
                          th:text="${#strings.substring(headerInfo.nickname(), 0, 1)}"
                          class="text-primary-700 text-sm font-semibold">U</span>
                    <span th:unless="${headerInfo != null}" class="text-primary-700 text-sm font-semibold">U</span>
                </div>
                <!-- 닉네임 (sm 이상에서만 표시) -->
                <span th:if="${headerInfo != null}"
                      th:text="${headerInfo.nickname()}"
                      class="hidden sm:block text-sm font-medium text-gray-700">사용자</span>
            </a>

            <!-- 로그아웃 버튼 -->
            <button id="logout-btn"
                    class="p-2 text-gray-400 hover:text-gray-600 transition-colors"
                    title="로그아웃">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
            </button>
        </div>
    </div>
</header>
</body>
</html>
