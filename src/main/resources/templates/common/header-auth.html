
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header-auth"
        class="fixed top-0 left-0 right-0 z-50 h-14 bg-white border-b border-gray-200
               flex items-center justify-between px-6">

    <a href="/member/dashboard" class="flex items-center gap-2.5 shrink-0 select-none">
        <div class="w-8 h-8 rounded-lg overflow-hidden flex items-center justify-center"
             style="background:linear-gradient(135deg,#e84393 0%,#f5a623 50%,#7ed321 100%)">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2
                         h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <span class="text-lg font-bold text-gray-900 tracking-tight">DOCUMIND</span>
    </a>

    <div th:replace="~{common/header-auth :: user-info-area}"></div>
</header>

<div th:fragment="user-bar"
     class="h-14 bg-white border-b border-gray-200 flex items-center justify-end px-6 shrink-0">
    <div th:replace="~{common/header-auth :: user-info-area}"></div>
</div>

<div th:fragment="user-info-area" class="flex items-center gap-4">

    <!-- 무료 플랜 뱃지 -->
    <span class="hidden sm:inline-flex items-center px-3 py-1 rounded-full
                 text-xs font-medium bg-gray-100 text-gray-500">
        무료 플랜
    </span>

    <!-- 이름 + 역할 레이블 (두 줄) -->
    <div class="hidden sm:flex flex-col items-end leading-none gap-0.5">
        <span th:text="${headerInfo?.name() ?: '사용자'}"
              class="text-sm font-semibold text-gray-900">사용자</span>
        <span class="text-xs text-gray-400">
            <th:block th:if="${headerInfo != null and headerInfo.globalRole() != null}">
                <th:block th:if="${headerInfo.globalRole().name() == 'CEO'}">대표</th:block>
                <th:block th:if="${headerInfo.globalRole().name() == 'ADMIN'}">운영자</th:block>
                <th:block th:if="${headerInfo.globalRole().name() == 'EMPLOYEE'}">직원</th:block>
            </th:block>
        </span>
    </div>

    <!-- 프로필 이미지 (클릭 → /my/profile) -->
    <a href="/my/profile" class="shrink-0 hover:opacity-90 transition-opacity">
        <img th:if="${headerInfo?.profileImageUrl() != null}"
             th:src="${headerInfo.profileImageUrl()}" alt="프로필"
             class="w-9 h-9 rounded-full object-cover ring-2 ring-gray-200"/>
        <div th:unless="${headerInfo?.profileImageUrl() != null}"
             class="w-9 h-9 rounded-full bg-amber-400 flex items-center justify-center">
            <span th:text="${headerInfo?.nickname() != null
                             ? #strings.substring(headerInfo.nickname(),0,1) : 'U'}"
                  class="text-white text-sm font-bold">U</span>
        </div>
    </a>

    <!-- 로그아웃 버튼 -->
    <button id="logout-btn"
            class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6
                     a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span class="hidden sm:inline">로그아웃</span>
    </button>
</div>

<div th:fragment="logout-modal"
     id="logout-modal"
     class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-2xl shadow-2xl w-80 p-8 flex flex-col items-center gap-5">

        <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center">
            <svg class="w-7 h-7 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6
                         a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
        </div>

        <div class="text-center">
            <p class="text-base font-bold text-gray-900 mb-1">로그아웃</p>
            <p class="text-sm text-gray-500">로그아웃하시겠습니까?</p>
        </div>

        <div class="flex gap-3 w-full">
            <button id="logout-cancel"
                    class="flex-1 py-2.5 rounded-xl border border-gray-200
                           text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                취소
            </button>
            <button id="logout-confirm"
                    class="flex-1 py-2.5 rounded-xl bg-red-500 hover:bg-red-600
                           text-sm font-semibold text-white transition-colors">
                로그아웃
            </button>
        </div>
    </div>
</div>

</body>
</html>
