<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 마이페이지 사이드바 -->
<aside th:fragment="sidebar-mypage(activeMenu)"
       class="w-56 shrink-0 flex flex-col gap-1 py-2">

    <!-- 내 프로필 -->
    <a href="/my/profile"
       th:classappend="${activeMenu == 'profile'} ? 'bg-primary-50 text-primary-700 font-semibold' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
       class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm transition-colors">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        내 프로필
    </a>

    <!-- 회사 관리 (CEO, ADMIN만 표시) -->
    <a th:if="${headerInfo != null and (headerInfo.globalRole() == 'CEO' or headerInfo.globalRole() == 'ADMIN')}"
       href="/my/company"
       th:classappend="${activeMenu == 'company'} ? 'bg-primary-50 text-primary-700 font-semibold' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
       class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm transition-colors">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        회사 관리
    </a>

    <!-- 프로젝트 관리 (CEO, ADMIN만 표시) -->
    <a th:if="${headerInfo != null and (headerInfo.globalRole() == 'CEO' or headerInfo.globalRole() == 'ADMIN')}"
       href="/my/projects"
       th:classappend="${activeMenu == 'projects'} ? 'bg-primary-50 text-primary-700 font-semibold' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
       class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm transition-colors">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
        프로젝트 관리
    </a>
</aside>
</body>
</html>
